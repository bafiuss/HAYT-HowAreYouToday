<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Psychologist Signup</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/styles/psychologist-signup.css">
    </head>
    <body>
        <div th:insert="~{fragments/navbar :: navbar}"></div>
            <div class="content" >
                <div class="wrapper" id="wrapper">
                    <div class="form-wrapper sign-up-wrapper">
                        <form action="#" style="padding: 8%;">
                            <h1 style="padding: 20px 0;">Register as psychologist</h1>
                            <input type="text" placeholder="First Name">
                            <input type="text" placeholder="Last Name">
                            <input type="date" placeholder="Date of Birth">
                            <input type="text" placeholder="Phone Number">
                            <input type="text" placeholder="NID Number">
                            <input type="text" placeholder="Doctor Reg. number">
                            <input type="email" placeholder="Email">
                            <input type="password" placeholder="Password">
                            <input type="password" placeholder="Confirm Password">
                            <button>Sign Up</button>
                        </form>
                    </div>
                </div>
            </div>
        <div th:insert="~{fragments/footer :: footer}"></div>
    </body>
</html>
