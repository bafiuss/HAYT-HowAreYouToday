<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Tips</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/styles/tips.css">
    </head>
    <body>
        <div th:insert="~{fragments/navbar :: navbar}"></div>
            <div class="content">
                <div class="tips-header">
                    <h1 class="title">Breathing Exercises</h1>
                </div>
                <div class="container-fluid py-4">
                    <div class="row">
                        <div class="col-lg-4 col-md-6 mb-4" th:each="tip: ${breathingTips}">
                            <div class="card h-100">
                                <div class="card-header pb-0 tip-title-breathing">
                                    <h6 th:text="${tip.title}"></h6>
                                </div>
                                <div class="card-body p-3">
                                    <div class="timeline">
                                        <!-- STEP 1 -->
                                        <div class="timeline-block" th:if="${tip.step1 != 'none'}">
                                            <div class="timeline-icon text-success">
                                                <i class="fas fa-bell"></i>
                                            </div>
                                            <p class="step"><span class="text-success">STEP 1</span></p>
                                            <h6 class="text" th:text="${tip.step1}"></h6>
                                        </div>
                                        <!-- STEP 2 -->
                                        <div class="timeline-block" th:if="${tip.step2 != 'none'}">
                                            <div class="timeline-icon text-danger">
                                                <i class="fas fa-bell"></i>
                                            </div>
                                            <p class="step"><span class="text-danger">STEP 2</span></p>
                                            <h6 class="text" th:text="${tip.step2}"></h6>
                                        </div>
                                        <!-- STEP 3 -->
                                        <div class="timeline-block" th:if="${tip.step3 != 'none'}">
                                            <div class="timeline-icon text-primary">
                                                <i class="fas fa-bell"></i>
                                            </div>
                                            <p class="step"><span class="text-primary">STEP 3</span></p>
                                            <h6 class="text" th:text="${tip.step3}"></h6>
                                        </div>
                                        <!-- STEP 4 -->
                                        <div class="timeline-block" th:if="${tip.step4 != 'none'}">
                                            <div class="timeline-icon text-warning">
                                                <i class="fas fa-bell"></i>
                                            </div>
                                            <p class="step"><span class="text-warning">STEP 4</span></p>
                                            <h6 class="text" th:text="${tip.step4}"></h6>
                                        </div>
                                        <!-- STEP 5 -->
                                        <div class="timeline-block" th:if="${tip.step5 != 'none'}">
                                            <div class="timeline-icon text-secondary">
                                                <i class="fas fa-bell"></i>
                                            </div>
                                            <p class="step"><span class="text-secondary">STEP 5</span></p>
                                            <h6 class="text" th:text="${tip.step5}"></h6>
                                        </div>
                                    </div>
                                    <div>
                                        <form th:if="${randomTipIds.contains(tip.id)} and !${completedTipIds.contains(tip.id)}"
                                              th:action="@{'/patient-dashboard/tips/complete/' + ${tip.id}}" method="post">
                                            <button type="submit" class="button-24 w-100" onclick="this.style.display='none'">
                                                Complete
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tips-header">
                    <h1 class="title">Muscle Relaxation</h1>
                </div>
                <div class="container-fluid py-4">
                    <div class="row">
                        <div class="col-lg-4 col-md-6 mb-4" th:each="tip: ${muscleTips}">

                                    <h6 th:text="${tip.title}"></h6>
                                </div>
                                <div class="card-body p-3">
                                    <div class="timeline">
                                        <!-- STEP 1 -->
                                        <div class="timeline-block" th:if="${tip.step1 != 'none'}">

                                        </div>
                                        <!-- STEP 3 -->
                                        <div class="timeline-block" th:if="${tip.step3 != 'none'}">

                                                <i class="fas fa-bell"></i>
                                            </div>
                                            <p class="step"><span class="text-primary">STEP 3</span></p>
                                            <h6 class="text" th:text="${tip.step3}"></h6>
                                        </div>
                                        <!-- STEP 4 -->
                                        <div class="timeline-block" th:if="${tip.step4 != 'none'}">
                                            <div class="timeline-icon text-warning">
                                                <i class="fas fa-bell"></i>
                                            </div>
                                            <p class="step"><span class="text-warning">STEP 4</span></p>
                                            <h6 class="text" th:text="${tip.step4}"></h6>

                                        <!-- STEP 5 -->
                                        <div class="timeline-block" th:if="${tip.step5 != 'none'}">

                                            </div>
                                            <p class="step"><span class="text-secondary">STEP 5</span></p>
                                            <h6 class="text" th:text="${tip.step5}"></h6>
                                        </div>
                                    </div>
                                    <div>
                                        <form th:if="${randomTipIds.contains(tip.id)} and !${completedTipIds.contains(tip.id)}"
                                              th:action="@{'/patient-dashboard/tips/complete/' + ${tip.id}}" method="post">
                                            <button type="submit" class="button-24 w-100" onclick="this.style.display='none'">
                                                Mark as Complete
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tips-header">
                    <h1 class="title">Mindfulness Meditation</h1>
                </div>
                <div class="container-fluid py-4">
                    <div class="row">
                        <div class="col-lg-4 col-md-6 mb-4" th:each="tip: ${mindfulnessTips}">
                            <div class="card h-100">
                                <div class="card-header pb-0 tip-title-breathing-mindfulness">
                                    <h6 th:text="${tip.title}"></h6>
                                </div>
                                <div class="card-body p-3">
                                    <div class="timeline">

                                        <div class="timeline-block" th:if="${tip.step1 != 'none'}">
                                            <div class="timeline-icon text-success">
                                                <i class="fas fa-bell"></i>

                                            <h6 class="text" th:text="${tip.step1}"></h6>
                                        </div>
                                        <!-- STEP 2 -->
                                        <div class="timeline-block" th:if="${tip.step2 != 'none'}">
                                            <div class="timeline-icon text-danger">
                                                <i class="fas fa-bell"></i>
                                            </div>
                                            <p class="step"><span class="text-danger">STEP 2</span></p>
                                            <h6 class="text" th:text="${tip.step2}"></h6>

                                        </div>
                                        <!-- STEP 4 -->
                                        <div class="timeline-block" th:if="${tip.step4 != 'none'}">
                                            <div class="timeline-icon text-warning">
                                                <i class="fas fa-bell"></i>
                                            </div>
                                            <p class="step"><span class="text-warning">STEP 4</span></p>
                                            <h6 class="text" th:text="${tip.step4}"></h6>
                                        </div>
                                        <!-- STEP 5 -->
                                        <div class="timeline-block" th:if="${tip.step5 != 'none'}">
                                            <div class="timeline-icon text-secondary">
                                                <i class="fas fa-bell"></i>
                                            </div>
                                            <p class="step"><span class="text-secondary">STEP 5</span></p>
                                            <h6 class="text" th:text="${tip.step5}"></h6>
                                        </div>
                                    </div>
                                    <div>
                                        <form th:if="${randomTipIds.contains(tip.id)} and !${completedTipIds.contains(tip.id)}" th:action="@{'/patient-dashboard/tips/complete/' + ${tip.id}}" method="post">
                                            <button type="submit" class="button-24 w-100" onclick="this.style.display='none'">
                                                Mark as Complete
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        <div th:insert="~{fragments/footer :: footer}"></div>
    </body>
</html>
