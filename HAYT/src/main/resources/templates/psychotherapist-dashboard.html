<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Psychotherapist Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/styles/psychotherapist-dashboard.css">
    </head>
    <body>
        <div th:insert="~{fragments/navbar :: navbar}"></div>
            <div class="content">
                <div class="container my-5">
                    <div class="alert alert-primary" role="alert" th:if="${session.user != null}">
                        <span>Welcome back <span th:text="${session.user.getFirstName()}"></span>!</span>
                    </div>
                    <div class="alert alert-success" role="alert" th:if="${session.user != null}">
                        <span>Dashboard Overview</span>
                    </div>
                    <div class="row mb-4 text-center">
                        <div class="col-lg-4">
                            <div class="card">
                                <div class="card-header bg-danger text-white">
                                    <h5><i class="fas fa-user"></i> Patients</h5>
                                </div>
                                <div class="card-body d-flex align-items-center justify-content-center">
                                    <span class="display-4 fw-bold" th:text="${numberOfPatient}"></span>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-4">
                            <div class="card">
                                <div class="card-header bg-warning text-white">
                                    <h5><i class="fas fa-calendar"></i> Appointments</h5>
                                </div>
                                <div class="card-body d-flex align-items-center justify-content-center">
                                    <span class="display-4 fw-bold">#</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-4">
                            <div class="card">
                                <div class="card-header bg-info text-white">
                                    <h5><i class="fas fa-clipboard-check"></i> Sessions Completed</h5>
                                </div>
                                <div class="card-body d-flex align-items-center justify-content-center">
                                    <span class="display-4 fw-bold">#</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <!-- Elenco pazienti -->
                        <div class="col-lg-6 d-flex">
                            <div class="card equal-height w-100">
                                <div class="card-header bg-primary text-white">
                                    <h5><i class="fas fa-user"></i> Patient List</h5>
                                </div>
                                <div class="card-body">
                                    <table class="table table-hover">
                                        <thead>
                                        <tr>
                                            <th>Nome</th>
                                            <th>Età</th>
                                            <th>Ultima Visita</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr>
                                            <td>#</td>
                                            <td>#</td>
                                            <td>#</td>
                                        </tr>
                                        <tr>
                                            <td>#</td>
                                            <td>#</td>
                                            <td>#</td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <!-- Prossimi appuntamenti -->
                        <div class="col-lg-6 d-flex">
                            <div class="card equal-height w-100">
                                <div class="card-header bg-success text-white">
                                    <h5><i class="fas fa-calendar-check"></i> Upcoming Appointments</h5>
                                </div>
                                <div class="card-body">
                                    <ul class="list-group">
                                        <li class="list-group-item">#</li>
                                        <li class="list-group-item">#</li>
                                        <li class="list-group-item">#</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Calendario degli appuntamenti -->
                    <div class="row mt-4">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-header bg-dark text-white">
                                    <h5><i class="fas fa-calendar-alt"></i> Calendar</h5>
                                </div>
                                <div class="card-body">
                                    <div id="calendar"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        <div th:insert="~{fragments/footer :: footer}"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    </body>
</html>
