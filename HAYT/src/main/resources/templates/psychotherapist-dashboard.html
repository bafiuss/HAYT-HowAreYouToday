<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Psychotherapist Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/styles/psychotherapist-dashboard.css">
    </head>
    <body>
        <div th:insert="~{fragments/navbar :: navbar}"></div>
            <div class="content">
                <div class="container my-5">
                    <div class="alert alert-primary" role="alert" th:if="${session.user != null}">
                        <span>Welcome back <span th:text="${session.user.getFirstName()}"></span>!</span>
                    </div>
                    <div class="alert alert-success" role="alert" th:if="${session.user != null}">
                        <span>Dashboard Overview</span>
                    </div>
                    <div class="row mb-4 text-center">

                        <div class="col-lg-4 mt-4">
                            <div class="card">
                                <div class="card-header bg-danger text-white">
                                    <h5><i class="fas fa-user"></i> Patients</h5>
                                </div>
                                <div class="card-body d-flex align-items-center justify-content-center">
                                    <span class="display-4 fw-bold" th:text="${numberOfPatient}"></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-4 mt-4">
                            <div class="card">
                                <div class="card-header bg-warning text-white">
                                    <h5><i class="fas fa-calendar"></i> Appointments</h5>
                                </div>
                                <div class="card-body d-flex align-items-center justify-content-center">
                                    <span class="display-4 fw-bold" th:text="${scheduledAppointments}"></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-4 mt-4">
                            <div class="card">
                                <div class="card-header bg-primary text-white">
                                    <h5><i class="fas fa-clipboard-check"></i> Sessions Completed</h5>
                                </div>
                                <div class="card-body d-flex align-items-center justify-content-center">
                                    <span class="display-4 fw-bold" th:text="${sessionsCompleted}"></span>
                                </div>
                            </div>
                        </div>

                    </div>
                    <div class="row mt-4 text-center">

                        <div class="col-12 mb-4 d-flex">
                            <div class="card equal-height w-100">
                                <div class="card-header bg-success text-white">
                                    <h5><i class="fas fa-user"></i> Patient List</h5>
                                </div>
                                <div class="card-body">
                                    <table class="table table-hover">
                                        <thead>
                                            <tr>
                                                <th>First Name</th>
                                                <th>Last Name</th>
                                                <th>Email</th>
                                            </tr>
                                        </thead>
                                        <tbody th:each="firstTwoPatients: ${firstTwoPatients}">
                                            <tr>
                                                <td th:text="${firstTwoPatients.firstName}"></td>
                                                <td th:text="${firstTwoPatients.lastName}"></td>
                                                <td th:text="${firstTwoPatients.email}"></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                    <div class="text-end">
                                        <a href="/psychotherapist-dashboard/patients" class="btn btn-link">See more</a>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="row mt-4">
                        <div class="col-12 mb-4">
                            <div class="card h-100 p-3" style="background-color: #595d7b;">
                                <div class="calendar-header d-flex justify-content-between align-items-center">
                                    <button class="btn" onclick="prevMonth()"><i class="fas fa-chevron-left"></i></button>
                                    <h5 class="text-white font-weight-bolder mb-4 pt-2" id="monthYear">Appointments</h5>
                                    <button class="btn" onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button>
                                </div>
                                <div class="calendar-container">
                                    <div class="calendar-grid" id="calendar"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="fixed-plugin">
                <div class="modal fade" id="appointmentsModal" tabindex="-1" aria-labelledby="appointmentsModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="appointmentsModalLabel">Appointments for <span id="modalDate"></span></h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <div id="appointmentsList"></div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" id="closeDetailsAppointmentButton" data-bs-dismiss="modal">Close</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        <div th:insert="~{fragments/footer :: footer}"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/scripts/psychotherapist-appointments.js"></script>
    </body>
</html>
