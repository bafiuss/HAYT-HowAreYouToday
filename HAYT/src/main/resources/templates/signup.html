<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Patient Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/signup.css">
</head>
<body>
<div th:insert="~{fragments/navbar :: navbar}"></div>
<div class="content">
    <div th:if="${success_signup}" class="alert alert-success" role="alert" style="z-index: 2; margin-top: 3%;">
        <b> Account created successfully! </b>
    </div>
    <div class="signup-container">
        <div class="signup-header">
            <h1>Patient Signup</h1>
            <p>Enter your personal details and start your therapy</p>
        </div>
        <form action="/patient-signup" method="post" id="signupForm" th:object="${patientSignupDTO}">
            <div class="input-group">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <label></label>
                <input type="text" id="firstName" name="firstName" placeholder="First Name" th:field="*{firstName}">
                <label></label>
                <input type="text" id="lastName" name="lastName" placeholder="Last Name" th:field="*{lastName}">
                <label></label>
                <input type="email" id="email" name="email" placeholder="Email" th:field="*{email}">
                <label></label>
                <input type="password" id="patient-password" name="patient-password"  placeholder="Password" th:field="*{password}">
                <label></label>
                <input type="password" id="patient-confirmPassword" name="patient-confirmPassword"  placeholder="Confirm Password" th:field="*{confirmPassword}">
            </div>
            <div class="signup-footer">
                <button type="submit" class="signup-button">Signup</button>
                <hr>
                <button id="psychologist-signup" class="signup-button" style="background-color: #FFA726; border-color: #FF9800">Signup as psychologist</button>
            </div>
        </form>
    </div>
</div>
<div th:insert="~{fragments/footer :: footer}"></div>

</body>
</html>
