<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Patient Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/styles/patient-dashboard.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <div th:insert="~{fragments/navbar :: navbar}"></div>
            <div class="content">
                <div class="alert alert-info" style="width: 50%; font-size: 30px; text-align: center" role="alert" th:if="${user != null}">
                    <span>
                        Hey <span th:text="${user.firstName}"></span>, how are you feeling today?
                    </span>
                </div>
                <div class="ag-format-container">
                    <div class="ag-courses_box">
                        <div class="ag-courses_item">
                            <a href="/diary" class="ag-courses-item_link">
                                <div class="ag-courses-item_bg"></div>
                                <div class="ag-courses-item_title">Diary 📖</div>
                                <p class="ag-courses-item_description">Add a new thought about how you feel today.</p>
                            </a>
                        </div>
                        <div class="ag-courses_item">
                            <a href="/chat" class="ag-courses-item_link">
                                <div class="ag-courses-item_bg"></div>
                                <div class="ag-courses-item_title">Chat 💬</div>
                                <p class="ag-courses-item_description">Chat with the psychotherapist or book a teleconsultation for updates on the therapy.</p>
                            </a>
                        </div>
                        <div class="ag-courses_item">
                            <a href="/questionnaire" class="ag-courses-item_link">
                                <div class="ag-courses-item_bg"></div>
                                <div class="ag-courses-item_title">Questionnaire ❓</div>
                                <p class="ag-courses-item_description">Fill out the weekly questionnaire.</p>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        <div th:insert="~{fragments/footer :: footer}"></div>
    </body>
</html>
