<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Diary</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/styles/diary.css">
    </head>
    <body>
    <div th:insert="~{fragments/navbar :: navbar}"></div>
        <div class="content">
            <div class="patient-diary-header">
                <h1 class="title">Personal Diary</h1>
            </div>
            <div class="container-fluid py-4">
                <div class="row">
                    <div class="col-12 mt-4">
                        <div class="card mb-4 border-0" style="background-color: transparent">
                            <div class="card-body p-3">
                                <div class="row" id="thoughtsContainer">
                                    <div class="col-xl-3 col-md-6  mb-4">
                                        <div class="card h-100 card-plain border">
                                            <div class="card-body d-flex flex-column justify-content-center text-center">
                                                <a href="javascript:;" data-bs-toggle="modal" data-bs-target="#newPageModal" style="color: #8392AB !important">
                                                    <i class="fa fa-plus text-secondary mb-3"></i>
                                                    <h5 class="text-secondary">New Page</h5>
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                    <div th:each="thought : ${thoughtsList}"  class="col-xl-3 col-md-6 mb-4">
                                        <div class="card card-blog card-plain border-0">
                                            <div class="position-relative">
                                                <a class="d-block shadow-xl border-radius-xl">
                                                    <img src="/images/patient/diary-thought.jpg" alt="img-blur-shadow" class="img-fluid shadow border-radius-xl rounded-top">
                                                </a>
                                            </div>
                                            <div class="card-body">
                                                <p class="text-gradient text-dark mb-2 text-sm" style="color: #344767; !important;" th:text="${#temporals.format(thought.getCreatedAt(), 'dd/MM/yyyy')}"></p>
                                                <a href="javascript:;">
                                                    <h5 style="color: #344767; !important;">
                                                        I feel <strong th:text="${thought.getMood()}"></strong>
                                                    </h5>
                                                </a>
                                                    <p class="mb-4 text-sm" style="color: #8392AB !important" th:text="${thought.content.length() > 30 ? thought.content.substring(0, 30) + '...' : thought.content}"></p>
                                                <div class="d-flex align-items-center justify-content-between">
                                                    <button type="button"
                                                            class="button-24 view-thought-button"
                                                            data-bs-toggle="modal"
                                                            data-bs-target="#thoughtPageModal"
                                                            th:attr="data-title=${thought.title},
                                                                     data-content=${thought.content},
                                                                     data-mood=${thought.mood}">
                                                        View
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal fade" id="newPageModal" tabindex="-1" aria-labelledby="newPageModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="newPageModalLabel">Diary</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form action="/api/diary" method="post" th:object="${diaryEntryDTO}">
                                <div class="mb-3">
                                    <label for="pageTitle" class="form-label">Title</label>
                                    <input type="text" class="form-control" id="pageTitle" th:field="*{title}">
                                </div>
                                <div class="mb-3">
                                    <label for="pageContent" class="form-label">Content</label>
                                    <textarea class="form-control" id="pageContent" rows="3" th:field="*{content}"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Today I feel</label>
                                    <select class="form-select" name="mood" th:field="*{mood}">
                                        <option value="happy">Happy</option>
                                        <option value="sad">Sad</option>
                                        <option value="anxious">Anxious</option>
                                        <option value="lonely">Lonely</option>
                                        <option value="confused">Confused</option>
                                        <option value="angry">Angry</option>
                                        <option value="motivated">Motivated</option>
                                        <option value="overwhelmed">Overwhelmed</option>
                                        <option value="hopeful">Hopeful</option>
                                        <option value="grateful">Grateful</option>
                                    </select>
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="submit" class="btn btn-primary" id="saveThoughtButton">Save</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <!-- Modal -->
    <div class="modal fade" id="thoughtPageModal" tabindex="-1" aria-labelledby="thoughtModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="thoughtModalLabel">Thought Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" id="thoughtTitle" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Content</label>
                        <textarea class="form-control" id="thoughtContent" rows="5" readonly></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mood</label>
                        <input type="text" class="form-control" id="thoughtMood" readonly>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
    <div th:insert="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("saveThoughtButton").addEventListener("click", async () => {
            const titleInput = document.getElementById("pageTitle");
            const contentInput = document.getElementById("pageContent");
            const moodInput = document.querySelector(".form-select");

            const diaryEntry = {
                title: titleInput.value,
                content: contentInput.value,
                mood: moodInput.value
            };

            const response = await fetch("/api/diary", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(diaryEntry)
            });

            if (response.ok) {
                const newThought = await response.json();

                titleInput.value = "";
                contentInput.value = "";
                moodInput.value = "";

                const modalElement = document.getElementById("newPageModal");
                const modalInstance = bootstrap.Modal.getInstance(modalElement);
                modalInstance.hide();

                addThoughtToList(newThought);

            } else {
                alert("Errore durante il salvataggio.");
            }
        });

        function addThoughtToList(thought) {
            const thoughtsContainer = document.getElementById("thoughtsContainer");
            const newPageBox = thoughtsContainer.querySelector(".col-xl-3");

            const thoughtHTML = `
                <div class="col-xl-3 col-md-6 mb-4" id="thought-${thought.id}">
                    <div class="card card-blog card-plain border-0">
                        <div class="position-relative">
                            <a class="d-block shadow-xl border-radius-xl">
                                <img src="/images/patient/diary-thought.jpg" alt="img-blur-shadow" class="img-fluid shadow border-radius-xl rounded-top">
                            </a>
                        </div>
                        <div class="card-body">
                            <p class="text-gradient text-dark mb-2 text-sm" style="color: #344767;">${formatDate(thought.createdAt)}</p>
                               <h5 style="color: #344767;">
                                   I feel <strong>${thought.mood}</strong>
                               </h5>
                            <p class="mb-4 text-sm" style="color: #8392AB;">${truncateText(thought.content, 30)}</p>
                            <div class="d-flex align-items-center justify-content-between">
                                <button type="button" class="button-24" data-bs-toggle="modal" data-bs-target="#newPageModal">View</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            newPageBox.insertAdjacentHTML("afterend", thoughtHTML);
        }

        function truncateText(text, maxLength) {
            if (text.length <= maxLength) return text;
            return text.slice(0, maxLength).trim() + "...";
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('it-IT');
        }

        document.addEventListener("DOMContentLoaded", () => {
            const buttons = document.querySelectorAll('.view-thought-button');

            buttons.forEach(button => {
                button.addEventListener('click', function () {
                    const title = this.getAttribute('data-title');
                    const content = this.getAttribute('data-content');
                    const mood = this.getAttribute('data-mood');

                    // Popola i campi del modal
                    document.getElementById('thoughtTitle').value = title;
                    document.getElementById('thoughtContent').value = content;
                    document.getElementById('thoughtMood').value = mood;

                });
            });
        });
    </script>
    </body>
</html>
