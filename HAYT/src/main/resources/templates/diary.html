<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Diary</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/styles/diary.css">
    </head>
    <body>
    <div th:insert="~{fragments/navbar :: navbar}"></div>
        <div class="content">
            <div class="container mt-4" style="z-index: 2;">
                <div class="row transparent-grid" id="card-container">
                    <div class="col-md-3">
                        <div class="card mb-3 add-card" onclick="addNewCard()">
                            <div class="card-body">
                                <i class="fas fa-plus"></i>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card mb-3">
                            <img src="/images/patient/diary-thought.jpg" class="card-img-top" alt="...">
                            <div class="card-body">
                                <h5 class="card-title">Card title</h5>
                                <p class="card-text">Short text.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    <div th:insert="~{fragments/footer :: footer}"></div>
    <script>
        function addNewCard() {
            let newCard = document.createElement("div");
            newCard.classList.add("col-md-3"); // Cambiato da col-md-4 a col-md-2
            newCard.innerHTML = `
        <div class="card mb-3">
            <img src="/images/patient/diary-thought.jpg" class="card-img-top" alt="...">
            <div class="card-body">
                <h5 class="card-title">New</h5>
                <p class="card-text">Added now.</p>
            </div>
        </div>
    `;
            document.getElementById("card-container").appendChild(newCard);
        }

    </script>
    </body>
</html>
