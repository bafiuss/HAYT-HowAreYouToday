<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Diary</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/styles/diary.css">
    </head>
    <body>
    <div th:insert="~{fragments/navbar :: navbar}"></div>
        <div class="content">
            <div class="new-psychotherapist-header">
                <h1 class="title">Personal Diary</h1>
            </div>
            <div class="container mt-4" style="z-index: 2;">
                <div class="row transparent-grid" id="card-container">
                    <div class="col-md-3">
                        <div class="card mb-3 add-card" onclick="addNewThought()">
                            <div class="card-body">
                                <i class="fas fa-plus"></i>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card mb-3">
                            <img src="/images/patient/diary-thought.jpg" class="card-img-top" alt="...">
                            <div class="card-body">
                                <small class="text-muted">Created on: 18 Feb 2025</small>
                                <h5 class="card-title mt-2">Card Title</h5>
                                <p class="card-text">This is a short description of the content inside the card.</p>
                                <button class="btn btn-primary" id="viewButton">View</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="addCardModal" class="modal-overlay">
                <div class="modal-content">
                    <span class="close-btn" onclick="closeModal()">&times;</span>
                    <h3>New Thought</h3>
                    <hr>
                    <form id="newCardForm">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" required>

                        <label for="description">Description</label>
                        <textarea id="description" name="description" required></textarea>

                        <label for="category">Category</label>
                        <select id="category" name="category">
                            <option value="personal">Personal</option>
                            <option value="work">Work</option>
                            <option value="idea">Idea</option>
                        </select>
                        <button type="submit" class="btn btn-success" id="submitThought">Add</button>
                    </form>
                </div>
            </div>

        </div>
    <div th:insert="~{fragments/footer :: footer}"></div>
    <script>
        function addNewThought() {
            document.getElementById("addCardModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("addCardModal").style.display = "none";
        }

        document.getElementById("newCardForm").addEventListener("submit", function(event) {
            event.preventDefault();

            let title = document.getElementById("title").value;
            let description = document.getElementById("description").value;

            let truncatedDescription = description.length > 60 ? description.substring(0, 60) + "..." : description;

            let newCard = document.createElement("div");
            newCard.classList.add("col-md-3");
            newCard.innerHTML = `
        <div class="card mb-3">
            <img src="/images/patient/diary-thought.jpg" class="card-img-top" alt="...">
            <div class="card-body">
                <small class="text-muted">Created now</small>
                <h5 class="card-title mt-2">${title}</h5>
                <p class="card-text">${truncatedDescription}</p>
                <button class="btn btn-primary viewButton">View</button>
            </div>
        </div>
    `;

            document.getElementById("card-container").appendChild(newCard);

            closeModal();
            document.getElementById("newCardForm").reset();
        });

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
