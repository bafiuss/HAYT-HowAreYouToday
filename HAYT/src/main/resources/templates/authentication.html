<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/authentication.css">
</head>
<body>
<div th:insert="~{fragments/navbar :: navbar}"></div>
<div class="content" >
    <div th:if="${success}" class="alert alert-success" role="alert" style="z-index: 2; margin: 6.5% 0">
        <b> Account created successfully! </b>
    </div>
    <div class="wrapper" id="wrapper" >
        <div class="form-wrapper sign-up-wrapper">
            <form method="post" th:object="${patientSignupDto}" action="/patient-signup" style="padding: 12%;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <h1 style="padding: 20px 0;">Create Account</h1>

                <input type="text" placeholder="First Name" th:field="${patientSignupDto.firstName}"/>
                <p th:if="${#fields.hasErrors('firstName')}" th:errorClass="text-danger" th:errors="${patientSignupDto.firstName}"></p>

                <input type="text" placeholder="Last Name" th:field="${patientSignupDto.lastName}"/>
                <p th:if="${#fields.hasErrors('lastName')}" th:errorClass="text-danger" th:errors="${patientSignupDto.lastName}"></p>

                <input type="email" placeholder="Email" th:field="${patientSignupDto.email}"/>
                <p th:if="${#fields.hasErrors('email')}" th:errorClass="text-danger" th:errors="${patientSignupDto.email}"></p>

                <input type="password" placeholder="Password" th:field="${patientSignupDto.password}"/>
                <p th:if="${#fields.hasErrors('password')}" th:errorClass="text-danger" th:errors="${patientSignupDto.password}"></p>

                <input type="password" placeholder="Confirm Password" th:field="${patientSignupDto.confirmPassword}"/>
                <p th:if="${#fields.hasErrors('confirmPassword')}" th:errorClass="text-danger" th:errors="${patientSignupDto.confirmPassword}"></p>

                <button type="submit" style="margin: 20px 0;">Sign Up</button>
            </form>
        </div>
        <div class="form-wrapper sign-in-wrapper">
            <form action="#">
                <h1 style="padding: 20px 0;">Sign in</h1>
                <input type="email" placeholder="Email" />
                <input type="password" placeholder="Password" />
                <a href="#" class="access-a"></a>
                <button>Sign In</button>
            </form>
        </div>
        <div class="overlay-wrapper">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p class="access-p">To keep connected with us please login with your personal info</p>
                    <button class="ghost" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Friend!</h1>
                    <p class="access-p">Enter your personal details and start your therapy</p>
                    <button class="ghost" id="signUp">Sign Up</button>
                    <p class="access-p" style="margin: 7px 0;">or</p>
                    <button onclick="location.href='/psychologist-signup'" class="ghost" id="psychologist-signup" style="background-color: #FFA726; border-color: #FF9800">Register as psychologist</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('wrapper');

        signUpButton.addEventListener('click', () => {
            container.classList.add("right-panel-active");
        });

        signInButton.addEventListener('click', () => {
            container.classList.remove("right-panel-active");
        });
    </script>
</div>
<div th:insert="~{fragments/footer :: footer}"></div>

</body>
</html>
