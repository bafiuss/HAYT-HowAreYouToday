<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/styles/access.css">
        <script type="text/javascript" src="/scripts/validate.js"></script>
    </head>
    <body>
        <div th:insert="~{fragments/navbar :: navbar}"></div>
        <div class="content">
            <div th:if="${failedLogin}" class="alert alert-danger" role="alert" style="z-index: 2; margin-top: 6%;">
                <b> Wrong username or password. </b>
            </div>
            <div class="signup-container">
                <div class="signup-header">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info or <a href="/signup">signup here</a></p>
                </div>
                <form action="/login" method="post" id="signupForm" onsubmit="return checkLogin(this)">
                    <div class="input-group">
                        <div class="input-content">
                            <label>Email</label>
                            <input type="text" id="email" name="username"  onChange="return validateEmail()">
                            <span id="errorEmail" style="font-size: 15px;"></span>
                        </div>
                        <div class="input-content">
                            <label>Password</label>
                            <input type="password" id="password" name="password">
                        </div>
                    </div>
                    <div class="signup-footer">
                        <button type="submit" class="signup-button" id="submitButton">Login</button>
                    </div>
                </form>
            </div>
        </div>
        <div th:insert="~{fragments/footer :: footer}"></div>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const content = document.querySelector(".content");
                if (window.location.pathname.includes("psychotherapist-signup")) {
                    content.style.backgroundImage = "url('/images/authentication/psychotherapist-signup-background.jpg')";
                } else {
                    content.style.backgroundImage = "url('/images/authentication/access-background.jpg')";
                }
            });
        </script>
    </body>
</html>
